services:
  db:
    image: postgres
    container_name: diplomind_db
    restart: always
    shm_size: 128mb
    volumes:
      - ./diplomind_be/mig:/docker-entrypoint-initdb.d/:ro
      - pg_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    networks:
      - diplomind_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./diplomind_be
      dockerfile: dockerfile
    container_name: diplomind_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@db:5432/$POSTGRES_DB
      JWT_SECRET: $JWT_SECRET
      COOKIE_NAME: $COOKIE_NAME
    ports:
      - "3000:3000"
    networks:
      - diplomind_network

  frontend:
    build: 
      context: ./diplomind_fe
      dockerfile: Dockerfile
    container_name: diplomind_fe
    ports:
      - "5173:80"
    networks:
      - diplomind_network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  pg_data:
    name: diplomind_infra

networks:
  diplomind_network:
    name: diplomind_network
